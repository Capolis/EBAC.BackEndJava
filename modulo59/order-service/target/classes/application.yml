server:
  port: 8080

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:orderdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# URLs dos outros serviços
customer:
  service:
    url: http://localhost:8081
inventory:
  service:
    url: http://localhost:8082
payment:
  service:
    url: http://localhost:8083

# Configuração do Resilience4j (Circuit Breaker)
resilience4j.circuitbreaker:
  instances:
    checkoutFlow:
      registerHealthIndicator: true
      slidingWindowSize: 5               # Analisa as últimas 5 chamadas
      failureRateThreshold: 50           # Se 50% falhar (ex: 3 de 5), o circuito ABRE
      waitDurationInOpenState: 10s       # Tempo que o circuito fica aberto antes de tentar de novo (Half-Open)
      permittedNumberOfCallsInHalfOpenState: 3 # Tentativas permitidas no estado Half-Open

springdoc:
  swagger-ui:
    path: /swagger-ui.html # Caminho para acessar a interface grafica
  api-docs:
    path: /v3/api-docs # Caminho onde o JSON da documentacao e gerado